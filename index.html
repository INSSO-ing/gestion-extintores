<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SuperSpuma · Gestión de Extintores</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        :root {
            --bg: #f5f0e8; --card-bg: rgba(255,255,255,0.92); --text: #3E2723;
            --text-sec: #5D4037; --header-bg: linear-gradient(135deg, #3E2723, #4E342E);
            --sombra: 0 2px 10px rgba(0,0,0,0.08); --marron: #3E2723; --marron-medio: #4E342E; --crema: #FFF8E1;
        }
        .dark-mode {
            --bg: #1a1a1a; --card-bg: rgba(30,30,30,0.95); --text: #FFF8E1;
            --text-sec: #ccc; --header-bg: linear-gradient(135deg, #111, #222); --sombra: 0 2px 10px rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 16px; }

        .header { background: var(--header-bg); color: #FFF8E1; padding: 14px 20px; border-radius: 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
        .header img { width: 45px; height: 45px; border-radius: 10px; background: #FFF8E1; padding: 3px; }
        .header h1 { font-size: 20px; font-weight: 800; }
        .header .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .header select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #FFF8E1; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; min-width: 220px; }
        .btn-icon { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #FFF8E1; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .conexion-dot { width: 10px; height: 10px; border-radius: 50%; background: #4CAF50; display: inline-block; }

        .nav-principal { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .nav-principal button { padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer; background: #eee; color: #333; }
        .nav-principal button.activo { background: var(--marron); color: #FFF8E1; }
        .nav-principal button.destacado { background: #2E7D32; color: white; }

        .grid-sucursales { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .card-sucursal { background: var(--card-bg); backdrop-filter: blur(8px); border-radius: 14px; padding: 16px; cursor: pointer; transition: 0.2s; border-left: 5px solid #4E342E; box-shadow: var(--sombra); }
        .card-sucursal:hover { transform: translateY(-3px); }

        .tabla-container { background: var(--card-bg); backdrop-filter: blur(8px); border-radius: 14px; padding: 16px; box-shadow: var(--sombra); margin-bottom: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: var(--marron); color: #FFF8E1; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; }
        td { padding: 7px 10px; border-bottom: 1px solid #eee; color: var(--text); }
        .badge { padding: 3px 7px; border-radius: 8px; font-size: 9px; font-weight: 700; }
        .badge.critico { background: #FF0000; color: white; } .badge.alta { background: #FF6600; color: white; }
        .badge.media { background: #FFCC00; color: #333; } .badge.baja { background: #33CCFF; color: #333; } .badge.normal { background: #00CC66; color: white; }
        .badge.completado { background: #2E7D32; color: white; } .badge.pendiente { background: #C62828; color: white; }

        .btn { padding: 7px 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 11px; cursor: pointer; background: #4E342E; color: #FFF8E1; }
        .btn-verde { background: #2E7D32; } .btn-rojo { background: #C62828; } .btn-azul { background: #1565C0; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-row .full { grid-column: 1 / -1; }
        input, select, textarea { width: 100%; padding: 9px; border: 2px solid #ddd; border-radius: 8px; font-size: 12px; background: var(--card-bg); color: var(--text); }
        label { display: block; font-weight: 600; font-size: 10px; color: var(--text-sec); margin-bottom: 2px; }

        .checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .checklist-item .nombre { flex: 1; font-weight: 600; font-size: 12px; }
        .checklist-item .opciones button { padding: 5px 14px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 2px solid #ccc; cursor: pointer; background: white; color: #333; }
        .checklist-item .opciones button.sel-ok { background: #2E7D32; color: white; border-color: #2E7D32; }
        .checklist-item .opciones button.sel-nook { background: #C62828; color: white; border-color: #C62828; }

        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #2E7D32; transition: width 0.3s; border-radius: 4px; }

        .firma-container { border: 2px dashed #ccc; border-radius: 10px; margin-top: 8px; }
        .firma-container canvas { width: 100%; height: 120px; cursor: crosshair; }

        .mapa-mini { width: 100%; height: 150px; border-radius: 10px; margin-top: 8px; border: 1px solid #ddd; }
        .mapa-link { font-size: 10px; color: #1565C0; cursor: pointer; text-decoration: underline; display: block; margin-top: 4px; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal { background: white; border-radius: 16px; padding: 24px; max-width: 650px; width: 90%; max-height: 90vh; overflow-y: auto; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://i.imgur.com/MbDDBwH.png" alt="SuperSpuma">
        <div><h1>SuperSpuma</h1><small>Seguridad Industrial <span class="conexion-dot" id="conexion-dot"></span></small></div>
        <div class="header-right">
            <button class="btn-icon" onclick="toggleDarkMode()">🌓</button>
            <select id="sucursal-select" onchange="seleccionarSucursal(this.value)"><option value="">🏢 Seleccionar sucursal...</option></select>
        </div>
    </div>

    <div class="nav-principal">
        <button class="activo" onclick="mostrarVista('sucursales')">🏢 Sucursales</button>
        <button onclick="mostrarVista('historial')">📋 Historial</button>
        <button class="destacado" onclick="mostrarVista('inspeccion-rapida')">✅ Inspección Rápida</button>
        <button onclick="mostrarVista('panel-sucursal')" id="btn-panel-sucursal" disabled>📂 Panel</button>
    </div>

    <div id="vista-sucursales" class="vista"><h2>🏢 Sucursales</h2><div class="grid-sucursales" id="grid-sucursales-container"></div></div>
    <div id="vista-historial" class="vista" style="display:none;"><h2>📋 Historial</h2><div class="tabla-container"><table><thead><tr><th>Suc</th><th>Ubicación</th><th>Tipo</th><th>Vence</th><th>Prioridad</th></tr></thead><tbody id="tabla-historial"></tbody></table></div></div>
    <div id="vista-panel-sucursal" class="vista" style="display:none;"><p>Panel de sucursal</p></div>

    <!-- INSPECCIÓN RÁPIDA -->
    <div id="vista-inspeccion-rapida" class="vista" style="display:none;">
        <h2 style="margin-bottom:16px;">✅ Inspección Rápida de Extintores</h2>
        <div class="tabla-container">
            <form onsubmit="guardarInspeccionRapida(event)">
                <div class="form-row">
                    <div><label>🏢 Sucursal</label><select id="ir-sucursal" required onchange="cargarExtintoresIR()"><option value="">Seleccionar...</option></select></div>
                    <div><label>🧯 Extintor</label><select id="ir-extintor" required><option value="">Primero seleccioná sucursal</option></select></div>
                </div>
                <div id="ir-info-extintor" style="background:#f9f9f9;border-radius:10px;padding:12px;margin-bottom:12px;display:none;"></div>
                <div class="form-row">
                    <div><label>👤 Inspector</label><input type="text" id="ir-inspector" required placeholder="Tu nombre"></div>
                    <div><label>📸 Foto</label><input type="file" id="ir-foto" accept="image/*" capture="environment"></div>
                </div>
                <div class="progress-bar"><div class="fill" id="ir-progress" style="width:0%;"></div></div>
                <div id="ir-checklist-items"></div>
                <div class="form-row" style="margin-top:12px;"><div class="full"><label>📝 Observaciones</label><textarea id="ir-observaciones" rows="2"></textarea></div></div>
                <div class="gps-info" id="ir-gps">📍 Obteniendo ubicación...</div>
                <div id="ir-mapa-container"></div>
                <div class="form-row"><div class="full"><label>✍️ Firma</label><div class="firma-container"><canvas id="ir-firma-canvas" width="400" height="120"></canvas></div><button type="button" class="btn btn-small" onclick="limpiarFirma()" style="margin-top:4px;">🗑️ Limpiar</button></div></div>
                <button type="submit" class="btn btn-verde" style="width:100%;padding:14px;font-size:14px;margin-top:12px;">✅ Guardar Inspección</button>
            </form>
            <div style="margin-top:20px;padding-top:16px;border-top:2px solid #eee;">
                <h4>📋 Últimas inspecciones</h4>
                <table><thead><tr><th>Fecha</th><th>Extintor</th><th>Inspector</th><th>Resultado</th><th>GPS</th></tr></thead><tbody id="ir-ultimos"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyArNANQ-R-RsiMJz8w401pLkwmNhxXW9UY", authDomain: "gestion-extintores-42b55.firebaseapp.com",
        projectId: "gestion-extintores-42b55", storageBucket: "gestion-extintores-42b55.firebasestorage.app",
        messagingSenderId: "420148708853", appId: "1:420148708853:web:3d90792c1b3c83be904cbc",
        databaseURL: "https://gestion-extintores-42b55-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_API_KEY = 'ccace8b069999997554d73161868c495';

    const SUCURSALES = {
        'paseo_la_galeria': { nombre: 'Paseo La Galería', direccion: 'Avda. Santa Teresa 1827' },
        'villamorra_shopping': { nombre: 'Villamorra Shopping', direccion: 'Charles De Gaulle casi Av. Mariscal López' },
        'mall_excelsior': { nombre: 'Mall Excelsior', direccion: 'Local comercial dentro del shopping céntrico' },
        'fernando_de_la_mora': { nombre: 'Fernando de la Mora', direccion: 'Calle Capitán Bado' },
        'nemby': { nombre: 'Ñemby', direccion: 'Avda. Manuel O. Guerrero casi Av. La Victoria' },
        'mariano_roque_alonso': { nombre: 'Mariano Roque Alonso (Outlet/Saldos)', direccion: 'Calle Corrales' },
        'terminal': { nombre: 'Terminal', direccion: 'Avda. Fernando de la Mora N° 1615' },
        'villeta': { nombre: 'Villeta (Planta Industrial)', direccion: 'Ruta Ypané-Villeta' },
        'ciudad_del_este': { nombre: 'Ciudad del Este', direccion: 'Avda. Regimiento Mcal. López 1068' },
        'encarnacion': { nombre: 'Encarnación', direccion: 'Ruta Nº 6 Juan León Mallorquín' }
    };

    const CHECKLIST_ITEMS = ['Manómetro', 'Manguera', 'Precinto', 'Boquilla', 'Etiqueta', 'Gatillo', 'Pintura', 'Soporte'];
    let datosExtintores = {}, datosChecklists = {}, coordenadasActuales = null;

    db.ref('.info/connected').on('value', snap => { document.getElementById('conexion-dot').style.background = snap.val() ? '#4CAF50' : '#f44336'; });
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); }
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

    function cargarDatos() {
        db.ref('extintores').on('value', snap => { datosExtintores = snap.val() || {}; });
        db.ref('inspecciones').on('value', snap => { datosChecklists = snap.val() || {}; });
    }

    function mostrarVista(v) {
        document.querySelectorAll('.vista').forEach(x => x.style.display = 'none');
        document.getElementById('vista-'+v).style.display = 'block';
        document.querySelectorAll('.nav-principal button').forEach(b => b.classList.remove('activo'));
        const vistas = ['sucursales','historial','inspeccion-rapida','panel-sucursal'];
        document.querySelectorAll('.nav-principal button')[vistas.indexOf(v)]?.classList.add('activo');
        if (v === 'inspeccion-rapida') { cargarIRSelects(); generarIRItems(); initFirma(); obtenerGPS(); cargarIRUltimos(); }
        if (v === 'historial') cargarHistorial();
    }

    function cargarGridSucursales() {
        document.getElementById('grid-sucursales-container').innerHTML = Object.entries(SUCURSALES).map(([id,s]) => `<div class="card-sucursal" onclick="document.getElementById('sucursal-select').value='${id}'"><h3>${s.nombre}</h3><div style="font-size:10px;color:#888;">📍 ${s.direccion}</div></div>`).join('');
    }

    function cargarSelectSucursales() {
        document.getElementById('sucursal-select').innerHTML = '<option value="">🏢 Seleccionar...</option>' + Object.entries(SUCURSALES).map(([id,s]) => `<option value="${id}">${s.nombre}</option>`).join('');
    }

    function seleccionarSucursal(id) { if(id) mostrarVista('panel-sucursal'); }

    function cargarHistorial() {
        document.getElementById('tabla-historial').innerHTML = Object.entries(datosExtintores).sort((a,b) => new Date(a[1].fechaProxima||'9999') - new Date(b[1].fechaProxima||'9999')).map(([id,d]) => {
            const p = calcularPrioridad(d.fechaProxima);
            return `<tr><td>${SUCURSALES[d.sucursal]?.nombre||d.sucursal}</td><td>${d.ubicacion||''}</td><td>${d.tipo||''}</td><td>${d.fechaProxima||''}</td><td><span class="badge ${p.prioridad}">${p.label}</span></td></tr>`;
        }).join('');
    }

    function calcularPrioridad(fecha) {
        if (!fecha) return { prioridad: 'normal', label: 'Normal' };
        const diff = Math.ceil((new Date(fecha) - new Date()) / (1000*60*60*24));
        if (diff < 0) return { prioridad: 'critico', label: 'CRÍTICO' };
        if (diff <= 7) return { prioridad: 'alta', label: 'ALTA' };
        if (diff <= 15) return { prioridad: 'media', label: 'MEDIA' };
        if (diff <= 30) return { prioridad: 'baja', label: 'BAJA' };
        return { prioridad: 'normal', label: 'Normal' };
    }

    async function subirFotoImgBB(file, nombre) {
        const fd = new FormData(); fd.append('image', file, nombre || file.name);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
        const d = await r.json(); if (d.success) return d.data.url;
        throw new Error('Error');
    }

    // INSPECCIÓN RÁPIDA
    function cargarIRSelects() {
        document.getElementById('ir-sucursal').innerHTML = '<option value="">Seleccionar sucursal...</option>' + Object.entries(SUCURSALES).map(([id,s]) => `<option value="${id}">${s.nombre}</option>`).join('');
    }

    function cargarExtintoresIR() {
        const suc = document.getElementById('ir-sucursal').value;
        const sel = document.getElementById('ir-extintor');
        sel.innerHTML = '<option value="">Seleccionar extintor...</option>';
        document.getElementById('ir-info-extintor').style.display = 'none';
        if (!suc) return;
        Object.entries(datosExtintores).forEach(([id,d]) => {
            if (d.sucursal === suc) sel.innerHTML += `<option value="${id}">${d.ubicacion||'N/A'} - ${d.tipo||'N/A'}</option>`;
        });
        sel.onchange = function() {
            const d = datosExtintores[this.value];
            if (d) {
                const p = calcularPrioridad(d.fechaProxima);
                document.getElementById('ir-info-extintor').style.display = 'block';
                document.getElementById('ir-info-extintor').innerHTML = `<strong>${d.tipo} ${d.tamano}</strong> · ${d.ubicacion}<br>Vence: ${d.fechaProxima||'N/A'} · <span class="badge ${p.prioridad}">${p.label}</span>${p.prioridad==='critico'?'<br>⚠️ <strong style=color:red;>VENCIDO</strong>':''}`;
            }
        };
    }

    function generarIRItems() {
        document.getElementById('ir-checklist-items').innerHTML = CHECKLIST_ITEMS.map(i => `<div class="checklist-item"><span class="nombre">${i}</span><div class="opciones"><button type="button" onclick="marcarIR(this,'ok')">✅ OK</button><button type="button" onclick="marcarIR(this,'nook')">❌ NO OK</button></div></div>`).join('');
        actualizarProgreso();
    }

    function marcarIR(btn, tipo) {
        const p = btn.parentElement; p.querySelectorAll('button').forEach(b => b.classList.remove('sel-ok','sel-nook'));
        btn.classList.add(tipo==='ok'?'sel-ok':'sel-nook'); actualizarProgreso();
    }

    function actualizarProgreso() {
        const total = CHECKLIST_ITEMS.length;
        const marcados = document.querySelectorAll('#ir-checklist-items .sel-ok, #ir-checklist-items .sel-nook').length;
        document.getElementById('ir-progress').style.width = ((marcados/total)*100) + '%';
    }

    // GPS
    function obtenerGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                coordenadasActuales = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                document.getElementById('ir-gps').innerHTML = `📍 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                mostrarMiniMapa(pos.coords.latitude, pos.coords.longitude);
            }, () => { document.getElementById('ir-gps').textContent = '📍 GPS no disponible'; });
        }
    }

    function mostrarMiniMapa(lat, lng) {
        const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${lng-0.002},${lat-0.001},${lng+0.002},${lat+0.001}&layer=mapnik&marker=${lat},${lng}`;
        document.getElementById('ir-mapa-container').innerHTML = `
            <iframe class="mapa-mini" src="${mapUrl}" frameborder="0" scrolling="no"></iframe>
            <a class="mapa-link" href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">📍 Ver en Google Maps</a>
            <a class="mapa-link" href="https://waze.com/ul?ll=${lat},${lng}&navigate=yes" target="_blank">🚗 Abrir en Waze</a>
        `;
    }

    // Firma
    function initFirma() {
        const c = document.getElementById('ir-firma-canvas');
        const ctx = c.getContext('2d');
        let dibujando = false;
        c.width = c.offsetWidth;
        c.onmousedown = e => { dibujando=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY); };
        c.onmousemove = e => { if(dibujando){ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();} };
        c.onmouseup = () => dibujando=false;
        c.ontouchstart = e => { e.preventDefault(); const t=e.touches[0]; dibujando=true; ctx.beginPath(); ctx.moveTo(t.clientX-c.getBoundingClientRect().left,t.clientY-c.getBoundingClientRect().top); };
        c.ontouchmove = e => { e.preventDefault(); if(dibujando){const t=e.touches[0];ctx.lineTo(t.clientX-c.getBoundingClientRect().left,t.clientY-c.getBoundingClientRect().top);ctx.stroke();} };
        c.ontouchend = () => dibujando=false;
    }

    function limpiarFirma() {
        const c = document.getElementById('ir-firma-canvas');
        c.getContext('2d').clearRect(0,0,c.width,c.height);
    }

    async function guardarInspeccionRapida(e) {
        e.preventDefault();
        const extintorId = document.getElementById('ir-extintor').value;
        const inspector = document.getElementById('ir-inspector').value.trim();
        if (!extintorId || !inspector) return alert('Completá todos los campos');

        const items = {};
        document.querySelectorAll('#ir-checklist-items .checklist-item').forEach((item,i) => {
            const sel = item.querySelector('.sel-ok,.sel-nook');
            items[CHECKLIST_ITEMS[i]] = sel ? (sel.classList.contains('sel-ok')?'OK':'NO OK') : 'No verificado';
        });

        let fotoURL = '';
        const fi = document.getElementById('ir-foto');
        if (fi.files[0]) { try { fotoURL = await subirFotoImgBB(fi.files[0], `insp_${extintorId}_${Date.now()}`); } catch(err) {} }

        const firmaData = document.getElementById('ir-firma-canvas').toDataURL();

        await db.ref('inspecciones').push({
            extintorId, sucursal: document.getElementById('ir-sucursal').value, tipo: 'inspeccion-rapida',
            inspector, items, observaciones: document.getElementById('ir-observaciones').value.trim(),
            fotoURL, firma: firmaData, gps: document.getElementById('ir-gps').textContent,
            coordenadas: coordenadasActuales, fecha: new Date().toISOString()
        });

        alert('✅ Inspección guardada!');
        document.getElementById('ir-observaciones').value = ''; document.getElementById('ir-foto').value = '';
        document.querySelectorAll('#ir-checklist-items button').forEach(b => b.classList.remove('sel-ok','sel-nook'));
        limpiarFirma(); actualizarProgreso(); cargarIRUltimos();
    }

    function cargarIRUltimos() {
        const items = Object.values(datosChecklists).filter(c => c.tipo === 'inspeccion-rapida').sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).slice(0,5);
        document.getElementById('ir-ultimos').innerHTML = items.map((c, i) => {
            const ext = datosExtintores[c.extintorId];
            const todoOK = Object.values(c.items||{}).every(v => v === 'OK');
            return `<tr>
                <td>${new Date(c.fecha).toLocaleDateString()}</td>
                <td>${ext?.ubicacion||c.extintorId}</td><td>${c.inspector}</td>
                <td><span class="badge ${todoOK?'completado':'pendiente'}">${todoOK?'OK':'Fallas'}</span></td>
                <td>
                    ${c.gps ? `<span style="font-size:10px;">${c.gps.replace('📍 ','')}</span>` : '-'}
                    ${c.coordenadas ? `<div id="mapa-hist-${i}" style="width:100px;height:60px;margin-top:4px;"></div>` : ''}
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="5">Sin inspecciones</td></tr>';
        setTimeout(() => {
            items.forEach((c, i) => {
                if (c.coordenadas) {
                    const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${c.coordenadas.lng-0.002},${c.coordenadas.lat-0.001},${c.coordenadas.lng+0.002},${c.coordenadas.lat+0.001}&layer=mapnik&marker=${c.coordenadas.lat},${c.coordenadas.lng}`;
                    const div = document.getElementById(`mapa-hist-${i}`);
                    if (div) div.innerHTML = `<iframe style="width:100%;height:60px;border-radius:6px;" src="${mapUrl}" frameborder="0"></iframe>`;
                }
            });
        }, 300);
    }

    cargarDatos();
    cargarGridSucursales();
    cargarSelectSucursales();
</script>
</body>
</html>
