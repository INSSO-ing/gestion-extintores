<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SuperSpuma · Inspector</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        :root {
            --marron-oscuro: #3E2723;
            --marron-medio: #4E342E;
            --crema: #FFF8E1;
            --crema-oscuro: #FFECB3;
            --blanco: #FFFFFF;
            --rojo: #C62828;
            --verde: #2E7D32;
            --naranja: #E65100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f0e8;
            color: #3E2723;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .app-header {
            background: linear-gradient(135deg, #3E2723, #4E342E);
            color: #FFF8E1;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .app-header h1 { font-size: 18px; font-weight: 700; }
        .app-header small { font-size: 10px; opacity: 0.8; display: block; }
        .app-header .logout-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
        }

        .app-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .bottom-nav {
            position: sticky;
            bottom: 0;
            background: #3E2723;
            display: flex;
            justify-content: space-around;
            padding: 8px;
            z-index: 50;
        }

        .bottom-nav button {
            background: transparent;
            border: none;
            color: #FFECB3;
            font-size: 10px;
            font-weight: 600;
            padding: 6px;
            border-radius: 10px;
            cursor: pointer;
            flex: 1;
        }

        .bottom-nav button.activo {
            background: #FFECB3;
            color: #3E2723;
        }

        .seccion { display: none; }
        .seccion.activa { display: block; }

        .tarjeta {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border-left: 4px solid #3E2723;
            margin-bottom: 12px;
        }

        .tarjeta .numero { font-size: 24px; font-weight: 700; }
        .tarjeta .etiqueta { font-size: 11px; color: #5D4037; }

        .tabla-container {
            background: white;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #3E2723; color: #FFF8E1; padding: 8px; text-align: left; font-size: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        .badge {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
        }
        .badge.critico { background: #FF0000; color: white; }
        .badge.alta { background: #FF6600; color: white; }
        .badge.media { background: #FFCC00; color: #333; }
        .badge.normal { background: #00CC66; color: white; }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            background: #4E342E;
            color: #FFF8E1;
        }

        .btn-rojo { background: #C62828; }
        .btn-verde { background: #2E7D32; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        label { font-weight: 600; font-size: 12px; color: #5D4037; display: block; margin-bottom: 4px; }

        #qr-reader { width: 100%; border-radius: 12px; overflow: hidden; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #3E2723;
            color: #FFF8E1;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div>
            <h1>SuperSpuma</h1>
            <small id="sucursal-nombre">Inspector</small>
        </div>
        <button class="logout-btn" onclick="logout()">Salir</button>
    </header>

    <main class="app-content">
        <section id="inicio" class="seccion activa">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="tarjetas-resumen"></div>
            <div class="tabla-container" style="margin-top:12px;">
                <h4>Próximos a Vencer</h4>
                <table id="tabla-vencimientos">
                    <thead><tr><th>Ubicación</th><th>Tipo</th><th>Vence</th><th>Prioridad</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="inventario" class="seccion">
            <div class="tabla-container">
                <table id="tabla-inventario">
                    <thead><tr><th>Ubicación</th><th>Tipo</th><th>Tamaño</th><th>Vence</th><th>Prioridad</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="escanear" class="seccion">
            <h3>Escanear QR</h3>
            <div id="qr-reader"></div>
            <button class="btn btn-rojo" id="btn-detener" onclick="detenerEscaner()" style="display:none;margin-top:8px;">Detener</button>
            <div id="resultado-escaner" style="margin-top:12px;"></div>
        </section>

        <section id="inspeccion" class="seccion">
            <h3>Registrar Inspección</h3>
            <form onsubmit="guardarInspeccion(event)">
                <label>Extintor</label>
                <select id="extintor-select" required><option value="">Seleccionar...</option></select>
                <label>Resultado</label>
                <select id="resultado" required>
                    <option value="Aprobado">Aprobado</option>
                    <option value="Rechazado">Rechazado</option>
                </select>
                <label>Observaciones</label>
                <textarea id="obs-inspeccion" rows="2"></textarea>
                <button type="submit" class="btn btn-verde" style="width:100%;">Registrar</button>
            </form>
            <div class="tabla-container" style="margin-top:16px;">
                <h4>Historial</h4>
                <table id="tabla-inspecciones">
                    <thead><tr><th>Fecha</th><th>Extintor</th><th>Resultado</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="activo" onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('inventario')">Inventario</button>
        <button onclick="mostrarSeccion('escanear')">Escanear</button>
        <button onclick="mostrarSeccion('inspeccion')">Inspección</button>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyArNANQ-R-RsiMJz8w401pLkwmNhxXW9UY",
        authDomain: "gestion-extintores-42b55.firebaseapp.com",
        projectId: "gestion-extintores-42b55",
        storageBucket: "gestion-extintores-42b55.firebasestorage.app",
        messagingSenderId: "420148708853",
        appId: "1:420148708853:web:3d90792c1b3c83be904cbc",
        databaseURL: "https://gestion-extintores-42b55-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const SUCURSALES = {
        'paseo_la_galeria': { nombre: 'Paseo La Galería', direccion: 'Avda. Santa Teresa 1827' },
        'villamorra_shopping': { nombre: 'Villamorra Shopping', direccion: 'Charles De Gaulle casi Av. Mariscal López' },
        'mall_excelsior': { nombre: 'Mall Excelsior', direccion: 'Local comercial dentro del shopping céntrico' },
        'fernando_de_la_mora': { nombre: 'Fernando de la Mora', direccion: 'Calle Capitán Bado' },
        'nemby': { nombre: 'Ñemby', direccion: 'Avda. Manuel O. Guerrero casi Av. La Victoria' },
        'mariano_roque_alonso': { nombre: 'Mariano Roque Alonso (Outlet/Saldos)', direccion: 'Calle Corrales' },
        'terminal': { nombre: 'Terminal', direccion: 'Avda. Fernando de la Mora N° 1615' },
        'villeta': { nombre: 'Villeta (Planta Industrial)', direccion: 'Ruta Ypané-Villeta' },
        'ciudad_del_este': { nombre: 'Ciudad del Este', direccion: 'Avda. Regimiento Mcal. López 1068' },
        'encarnacion': { nombre: 'Encarnación', direccion: 'Ruta Nº 6 Juan León Mallorquín' }
    };

    let usuarioActual = null;
    let sucursalAsignada = null;
    let datosExtintores = {};
    let html5QrCode = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('usuarios/' + user.uid).once('value', snap => {
                const data = snap.val() || {};
                if (data.rol === 'admin') {
                    window.location.href = 'admin.html';
                    return;
                }
                usuarioActual = { uid: user.uid, nombre: data.nombre || user.email, email: user.email, rol: data.rol || 'inspector' };
                sucursalAsignada = data.sucursal || 'paseo_la_galeria';
                document.getElementById('sucursal-nombre').textContent = SUCURSALES[sucursalAsignada]?.nombre || sucursalAsignada;
                iniciarInspector();
            });
        } else {
            window.location.href = 'index.html';
        }
    });

    function logout() {
        auth.signOut();
    }

    function iniciarInspector() {
        db.ref('extintores').on('value', snap => {
            const all = snap.val() || {};
            datosExtintores = {};
            Object.entries(all).forEach(([id, d]) => {
                if (d.sucursal === sucursalAsignada) datosExtintores[id] = d;
            });
            cargarInicio();
            cargarInventario();
            cargarSelectExtintores();
            cargarInspecciones();
        });
    }

    function cargarInicio() {
        const ext = Object.values(datosExtintores);
        const total = ext.length;
        let criticos = 0, altos = 0;
        ext.forEach(e => {
            if (!e.fechaProxima) return;
            const diff = Math.ceil((new Date(e.fechaProxima) - new Date()) / (1000*60*60*24));
            if (diff < 0) criticos++;
            else if (diff <= 7) altos++;
        });
        document.getElementById('tarjetas-resumen').innerHTML = `
            <div class="tarjeta"><div class="numero">${total}</div><div class="etiqueta">Total</div></div>
            <div class="tarjeta" style="border-left-color:#FF0000;"><div class="numero" style="color:#FF0000;">${criticos}</div><div class="etiqueta">Críticos</div></div>
            <div class="tarjeta" style="border-left-color:#FF6600;"><div class="numero" style="color:#FF6600;">${altos}</div><div class="etiqueta">Alta</div></div>
            <div class="tarjeta" style="border-left-color:#00CC66;"><div class="numero" style="color:#00CC66;">${total-criticos-altos}</div><div class="etiqueta">En Regla</div></div>
        `;
        const tbody = document.querySelector('#tabla-vencimientos tbody');
        const vencidos = ext.filter(e => e.fechaProxima).sort((a,b) => new Date(a.fechaProxima) - new Date(b.fechaProxima)).slice(0,10);
        tbody.innerHTML = vencidos.map(e => {
            const p = calcularPrioridad(e.fechaProxima);
            return `<tr><td>${e.ubicacion||'N/A'}</td><td>${e.tipo||'N/A'}</td><td>${e.fechaProxima}</td><td><span class="badge ${p.prioridad}">${p.label}</span></td></tr>`;
        }).join('') || '<tr><td colspan="4">Todo en orden</td></tr>';
    }

    function cargarInventario() {
        const tbody = document.querySelector('#tabla-inventario tbody');
        tbody.innerHTML = Object.entries(datosExtintores).map(([id, d]) => {
            const p = calcularPrioridad(d.fechaProxima);
            return `<tr><td>${d.ubicacion||'N/A'}</td><td>${d.tipo||'N/A'}</td><td>${d.tamano||'N/A'}</td><td>${d.fechaProxima||'N/A'}</td><td><span class="badge ${p.prioridad}">${p.label}</span></td></tr>`;
        }).join('') || '<tr><td colspan="5">Sin extintores</td></tr>';
    }

    function calcularPrioridad(fecha) {
        if (!fecha) return { prioridad: 'normal', label: 'Normal' };
        const diff = Math.ceil((new Date(fecha) - new Date()) / (1000*60*60*24));
        if (diff < 0) return { prioridad: 'critico', label: 'Crítico' };
        if (diff <= 7) return { prioridad: 'alta', label: 'Alta' };
        if (diff <= 15) return { prioridad: 'media', label: 'Media' };
        return { prioridad: 'normal', label: 'Normal' };
    }

    function cargarSelectExtintores() {
        const select = document.getElementById('extintor-select');
        select.innerHTML = '<option value="">Seleccionar...</option>' +
            Object.entries(datosExtintores).map(([id, d]) => `<option value="${id}">${d.ubicacion||'N/A'} - ${d.tipo||'N/A'}</option>`).join('');
    }

    function guardarInspeccion(e) {
        e.preventDefault();
        const extintorId = document.getElementById('extintor-select').value;
        if (!extintorId) return alert('Seleccione un extintor');
        db.ref('inspecciones').push({
            extintorId, sucursal: sucursalAsignada,
            inspector: usuarioActual.nombre,
            inspectorUid: usuarioActual.uid,
            resultado: document.getElementById('resultado').value,
            observaciones: document.getElementById('obs-inspeccion').value,
            fecha: new Date().toISOString()
        }).then(() => {
            alert('Inspección registrada');
            document.getElementById('obs-inspeccion').value = '';
            cargarInspecciones();
        });
    }

    function cargarInspecciones() {
        db.ref('inspecciones').orderByChild('sucursal').equalTo(sucursalAsignada).limitToLast(20).on('value', snap => {
            const data = snap.val() || {};
            const items = Object.entries(data).reverse();
            document.getElementById('tabla-inspecciones').innerHTML = items.map(([id, d]) => {
                const ext = datosExtintores[d.extintorId];
                return `<tr><td>${new Date(d.fecha).toLocaleDateString()}</td><td>${ext?.ubicacion||d.extintorId||'N/A'}</td><td>${d.resultado||'N/A'}</td></tr>`;
            }).join('') || '<tr><td colspan="3">Sin inspecciones</td></tr>';
        });
    }

    function mostrarSeccion(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
        document.getElementById(id).classList.add('activa');
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('activo'));
        const btns = document.querySelectorAll('.bottom-nav button');
        const secciones = ['inicio', 'inventario', 'escanear', 'inspeccion'];
        const idx = secciones.indexOf(id);
        if (idx >= 0 && btns[idx]) btns[idx].classList.add('activo');
        if (id === 'escanear') iniciarEscaner();
        else detenerEscaner();
    }

    function iniciarEscaner() {
        detenerEscaner();
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
            text => {
                detenerEscaner();
                const ext = datosExtintores[text];
                const res = document.getElementById('resultado-escaner');
                if (ext) {
                    const p = calcularPrioridad(ext.fechaProxima);
                    res.innerHTML = `<div class="tarjeta" style="border-left-color:${p.prioridad==='critico'?'#FF0000':p.prioridad==='alta'?'#FF6600':'#00CC66'};"><strong>${ext.ubicacion}</strong><br>${ext.tipo} ${ext.tamano}<br>Vence: ${ext.fechaProxima||'N/A'}<br><span class="badge ${p.prioridad}">${p.label}</span></div>`;
                } else {
                    res.innerHTML = '<div class="tarjeta" style="border-left-color:#FF0000;">Extintor no encontrado</div>';
                }
            },
            err => {}
        ).catch(err => console.warn(err));
    }

    function detenerEscaner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => html5QrCode.clear()).catch(() => {});
            html5QrCode = null;
        }
    }

    function mostrarToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }
</script>
</body>
</html>
